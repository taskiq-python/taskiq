name: Release python package

on:
  release:
    types:
      - released

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    env:
      UV_SYSTEM_PYTHON: 1
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: setup-uv
        name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "3.13"
          github-token: ${{ github.token }}
          python-version: "3.13"
      - run: uv build
      - name: Release package
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
